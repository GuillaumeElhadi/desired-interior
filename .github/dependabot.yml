version: 2
updates:
  # --- npm (root + apps/desktop) -----------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: main
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # --- pip / pyproject.toml (apps/api) -----------------------------------------
  # Note: Dependabot does not yet support uv natively. The pip ecosystem reads
  # pyproject.toml [project.dependencies] and requirements*.txt. This entry is a
  # no-op until apps/api/pyproject.toml is created in task 1.2.
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: main
    groups:
      pip-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # --- cargo (apps/desktop/src-tauri) ------------------------------------------
  # No-op until Cargo.toml is created in task 1.3.
  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: main
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # --- GitHub Actions -----------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: main
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies

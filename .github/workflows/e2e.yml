name: E2E Pipeline

# Opt-in: runs weekly (Sundays 02:00 UTC), on manual dispatch, or when
# a PR is labeled "run-e2e". FAL_KEY must be set in repository secrets.
on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
  pull_request:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.12"

jobs:
  e2e:
    name: E2E Pipeline Test
    # On pull_request events only run when the triggering label is "run-e2e".
    # Schedule and workflow_dispatch always run.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'run-e2e'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: apps/api
        run: uv sync

      - name: Run E2E pipeline test
        working-directory: apps/api
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: uv run pytest -m e2e -v --no-cov
